name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` (not `npm ci`): the lockfile is generated on Windows and
      # omits Linux-only optional native deps (Tailwind oxide / lightningcss,
      # @emnapi/*), which makes strict `npm ci` fail on the Linux runner.
      - run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build does not connect to Supabase (clients are created per-request),
          # but the public vars must be defined for the bundle.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

# End-to-end tests (Playwright) run locally against a real Supabase project and
# the demo account — see README. They are intentionally not part of CI because
# they require project secrets and a seeded database.
